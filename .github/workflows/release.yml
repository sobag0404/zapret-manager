name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release draft
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Test frontend
        working-directory: app/frontend
        run: pnpm test

      - name: Build frontend
        working-directory: app/frontend
        run: pnpm build

      - name: Test Rust workspace
        run: cargo test --workspace --all-features

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.2 --locked

      - name: Build Windows installer
        working-directory: app/tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --config tauri.release.conf.json

      - name: Package release
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart("v")
          New-Item -ItemType Directory -Force -Path release
          Get-ChildItem target/release/bundle/nsis -File |
            Copy-Item -Destination release -Force
          Get-ChildItem target/release/bundle/nsis -Recurse -File -Include "*.sig","*.zip","*.json" |
            Copy-Item -Destination release -Force

          $installer = Get-ChildItem release -Filter "Zapret Manager_*_x64-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found" }
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) { throw "Updater signature not found: $signaturePath" }

          $assetName = [uri]::EscapeDataString($installer.Name)
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$assetName"
          $signature = (Get-Content -Raw -LiteralPath $signaturePath).Trim()
          $manifest = [ordered]@{
            version = $version
            notes = "Zapret Manager $version stable release"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64-nsis" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 release/latest.json

          Get-ChildItem release -File |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $($_.Path | Split-Path -Leaf)" } |
            Set-Content -Encoding utf8 release/SHA256SUMS.txt

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
          tag_name: ${{ inputs.tag || github.ref_name }}
